<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Ad Details</title>
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
<div class="top-container">
  <h2 class="page-title"><span class="orange">Car</span>Ket</h2>
  <div class="buttons">
    <a href="/salepage"><i class="fa-solid fa-money-bill" style="color: rgb(234, 123, 16);"></i></a>
    <a href="/searchpage"> <i class="fa-solid fa-magnifying-glass" style="color: rgb(234, 123, 16);"></i></a>
  </div>
</div>

<div class="custom-form single-ad-container">

  <h2 class="orange" th:text="${ad.car.brand} + ' ' + ${ad.car.model}">Brand Model</h2>

  <img class="single-ad-image" th:if="${!#lists.isEmpty(ad.images)}"
       th:src="@{${ad.images[0]}}" alt="Car Image"/>

  <p class="custom-label" th:text="'Year: ' + ${ad.year}"></p>
  <p class="custom-label" th:text="'Price: $' + ${ad.price}"></p>
  <p class="custom-label" th:text="'Chassis: ' + ${ad.car.chassis}"></p>

  <div class="action-buttons" th:if="${#authentication.name == ad.user.email or #authorization.expression('hasRole(''ADMIN'')')}">

    <button th:if="${#authentication.name == ad.user.email}" type="button" class="custom-button" onclick="openModal()">Edit Price</button>

    <form th:action="@{/ad/api/delete/{id}(id=${ad.id})}" th:method="delete">
      <button type="submit" class="custom-button btn-delete" onclick="return confirm('Delete this ad?');">Delete</button>
    </form>
  </div>
</div>

<div id="priceModal" class="modal">
  <div class="modal-content custom-form">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 class="orange">Edit Price</h2>
    <form th:action="@{/ad/api/update/{id}(id=${ad.id})}" method="post">
      <label class="custom-label">New Price</label>
      <input class="custom-input" type="number" name="price" th:value="${ad.price}" required>
      <button type="submit" class="custom-button" style="width: 100%;">Save</button>
    </form>
  </div>
</div>
<script>
  var modal = document.getElementById("priceModal");
  function openModal() { modal.style.display = "block"; }
  function closeModal() { modal.style.display = "none"; }
  window.onclick = function(event) {
    if (event.target == modal) { modal.style.display = "none"; }
  }
</script>
</body>
</html>
